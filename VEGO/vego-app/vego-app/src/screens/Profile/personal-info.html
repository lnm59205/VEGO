<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VeGo - Thông tin cá nhân</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .phone-frame {
            width: 375px; height: 812px;
            background: #000; border-radius: 40px; padding: 8px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.4);
            transform: scale(0.8); transform-origin: center center;
            flex-shrink: 0; margin: -81px 0;
        }
        .phone-screen {
            width: 100%; height: 100%;
            background: #F8F8F8; border-radius: 32px;
            overflow-y: auto; overflow-x: hidden;
            display: flex; flex-direction: column;
            scrollbar-width: none; -ms-overflow-style: none;
        }
        .phone-screen::-webkit-scrollbar { display: none; }
        .header {
            background: white; padding: 50px 20px 15px;
            display: flex; align-items: center; justify-content: space-between;
            position: sticky; top: 0; z-index: 10;
            border-bottom: 1px solid #F0F0F0;
        }
        .back-btn {
            width: 36px; height: 36px; display: flex;
            align-items: center; justify-content: center;
            cursor: pointer; background: none; border: none;
            font-size: 24px; color: #333;
        }
        .header-title { font-size: 16px; font-weight: 600; color: #333; }
        .save-btn {
            background: none; border: none;
            color: #75FF93; font-size: 15px; font-weight: 600; cursor: pointer;
        }
        .avatar-section {
            background: white; padding: 24px 20px;
            display: flex; flex-direction: column; align-items: center; gap: 12px;
        }
        .avatar-wrap { position: relative; cursor: pointer; }
        .avatar-img {
            width: 90px; height: 90px; border-radius: 50%;
            background: linear-gradient(135deg, #81D4FA, #4FC3F7);
            display: flex; align-items: center; justify-content: center;
            font-size: 40px; overflow: hidden;
        }
        .avatar-img img { width: 100%; height: 100%; object-fit: cover; }
        .avatar-edit {
            position: absolute; bottom: 0; right: 0;
            width: 28px; height: 28px; border-radius: 50%;
            background: #75FF93; border: 2px solid white;
            display: flex; align-items: center; justify-content: center;
            font-size: 12px;
        }
        .avatar-hint { font-size: 13px; color: #999; }
        .name-row {
            display: flex; align-items: baseline; gap: 6px;
            flex-wrap: wrap; justify-content: center;
        }
        .display-name { font-size: 18px; font-weight: 700; color: #333; }
        .display-nickname {
            font-size: 14px; font-style: italic; color: #AAA;
        }
        .section {
            background: white; margin: 12px 16px;
            border-radius: 16px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
        }
        .section-title {
            font-size: 12px; font-weight: 700; color: #999;
            letter-spacing: 1px; padding: 14px 16px 8px;
            text-transform: uppercase;
            border-radius: 16px 16px 0 0;
            background: white;
        }
        .field {
            padding: 14px 16px;
            border-bottom: 1px solid #F5F5F5;
            background: white;
        }
        .field:first-child { border-radius: 16px 16px 0 0; }
        .field:last-child { border-bottom: none; border-radius: 0 0 16px 16px; }
        .field-label { font-size: 12px; color: #999; margin-bottom: 6px; }
        .field-input {
            width: 100%; border: none; outline: none;
            font-size: 15px; color: #333; background: transparent;
            font-family: inherit;
        }
        .field-input::placeholder { color: #CCC; }
        .field-select {
            width: 100%; border: none; outline: none;
            font-size: 15px; color: #333; background: transparent;
            font-family: inherit; appearance: none; cursor: pointer;
        }
        .birthday-row {
            display: flex; gap: 8px;
        }
        .birthday-row select {
            flex: 1; border: none; outline: none;
            font-size: 15px; color: #333; background: transparent;
            font-family: inherit; appearance: none; cursor: pointer;
        }
        .toast {
            position: fixed; top: 80px; left: 50%;
            transform: translateX(-50%) translateY(-100px);
            background: rgba(33,33,33,0.95); color: white;
            padding: 12px 20px; border-radius: 8px; font-size: 14px;
            z-index: 1000; opacity: 0; transition: all 0.3s ease-out;
        }
        .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
    </style>
</head>
<body>
<div class="toast" id="toast"></div>
<div class="phone-frame">
    <div class="phone-screen">
        <div class="header">
            <button class="back-btn" onclick="goBack()">‹</button>
            <div class="header-title">Thông tin cá nhân</div>
            <button class="save-btn" onclick="saveInfo()">Lưu</button>
        </div>

        <div class="avatar-section">
            <div class="avatar-wrap" onclick="document.getElementById('avatarInput').click()">
                <div class="avatar-img" id="avatarDisplay">👤</div>
                <div class="avatar-edit">✏️</div>
                <input type="file" id="avatarInput" accept="image/*" style="display:none" onchange="changeAvatar(event)"/>
            </div>
            <div class="avatar-hint">Nhấn để đổi ảnh đại diện</div>
            <div class="name-row">
                <span class="display-name" id="displayName"></span>
                <span class="display-nickname" id="displayNickname"></span>
            </div>
        </div>

        <div class="section">
            <div class="section-title">Thông tin cơ bản</div>
            <div class="field">
                <div class="field-label">Họ và tên</div>
                <input class="field-input" id="fullName" type="text" placeholder="Nhập họ và tên" />
            </div>
            <div class="field">
                <div class="field-label">Biệt danh</div>
                <input class="field-input" id="nickname" type="text" placeholder="Nhập biệt danh" />
            </div>
            <div class="field">
                    <div class="field-label">Ngày sinh</div>
                    <div class="birthday-row">
                        <select id="bDay">
                            <option value="">Ngày</option>
                        </select>
                        <select id="bMonth">
                            <option value="">Tháng</option>
                            <option value="1">Tháng 1</option><option value="2">Tháng 2</option>
                            <option value="3">Tháng 3</option><option value="4">Tháng 4</option>
                            <option value="5">Tháng 5</option><option value="6">Tháng 6</option>
                            <option value="7">Tháng 7</option><option value="8">Tháng 8</option>
                            <option value="9">Tháng 9</option><option value="10">Tháng 10</option>
                            <option value="11">Tháng 11</option><option value="12">Tháng 12</option>
                        </select>
                        <select id="bYear">
                            <option value="">Năm</option>
                        </select>
                    </div>
                </div>
            <div class="field">
                <div class="field-label">Giới tính</div>
                <select class="field-select" id="gender">
                    <option value="">Chọn giới tính</option>
                    <option value="male">Nam</option>
                    <option value="female">Nữ</option>
                    <option value="other">Khác</option>
                </select>
            </div>
        </div>

        <div class="section" style="margin-bottom: 24px;">
            <div class="section-title">Liên hệ</div>
            <div class="field">
                <div class="field-label">Số điện thoại</div>
                <input class="field-input" id="phone" type="tel" placeholder="Nhập số điện thoại" />
            </div>
            <div class="field">
                <div class="field-label">Email</div>
                <input class="field-input" id="email" type="email" placeholder="Nhập email" />
            </div>
        </div>
    </div>
</div>

<script>
    function goBack() {
        document.body.style.transition = 'opacity 0.3s ease';
        document.body.style.opacity = '0';
        setTimeout(() => { window.location.href = 'account.html'; }, 300);
    }

    function showToast(msg) {
        const t = document.getElementById('toast');
        t.textContent = msg;
        t.classList.add('show');
        setTimeout(() => t.classList.remove('show'), 2500);
    }

    function changeAvatar(e) {
        const file = e.target.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = ev => {
            localStorage.setItem('userAvatar', ev.target.result);
            document.getElementById('avatarDisplay').innerHTML = `<img src="${ev.target.result}" alt="Avatar">`;
            showToast('Đã cập nhật ảnh đại diện');
        };
        reader.readAsDataURL(file);
    }

    function saveInfo() {
        const fullName = document.getElementById('fullName').value.trim();
        const phone = document.getElementById('phone').value.trim();
        const email = document.getElementById('email').value.trim();
        const nickname = document.getElementById('nickname').value.trim();
        const day = document.getElementById('bDay').value;
        const month = document.getElementById('bMonth').value;
        const year = document.getElementById('bYear').value;
        const gender = document.getElementById('gender').value;

        if (fullName) localStorage.setItem('userName', fullName);
        if (phone) localStorage.setItem('userPhone', phone);
        if (email) localStorage.setItem('userEmail', email);
        if (nickname) localStorage.setItem('userNickname', nickname);
        if (day && month && year) localStorage.setItem('userBirthday', `${day}/${month}/${year}`);
        if (gender) localStorage.setItem('userGender', gender);

        // Cập nhật hiển thị tên + nickname
        updateNameDisplay(fullName, nickname);

        showToast('Đã lưu thông tin cá nhân');
    }

    function updateNameDisplay(name, nick) {
        document.getElementById('displayName').textContent = name || '';
        document.getElementById('displayNickname').textContent = nick ? '#' + nick : '';
    }

    window.addEventListener('load', () => {
        // Populate ngày (1-31)
        const dayEl = document.getElementById('bDay');
        for (let i = 1; i <= 31; i++) {
            const o = document.createElement('option');
            o.value = i; o.textContent = i;
            dayEl.appendChild(o);
        }
        // Populate năm (1950 - năm hiện tại)
        const yearEl = document.getElementById('bYear');
        const curYear = new Date().getFullYear();
        for (let y = curYear; y >= 1950; y--) {
            const o = document.createElement('option');
            o.value = y; o.textContent = y;
            yearEl.appendChild(o);
        }

        const avatar = localStorage.getItem('userAvatar');
        if (avatar) document.getElementById('avatarDisplay').innerHTML = `<img src="${avatar}" alt="Avatar">`;

        const name = localStorage.getItem('userName') || '';
        const nick = localStorage.getItem('userNickname') || '';
        if (name) document.getElementById('fullName').value = name;
        if (nick) document.getElementById('nickname').value = nick;
        const phone = localStorage.getItem('userPhone');
        if (phone) document.getElementById('phone').value = phone;
        const email = localStorage.getItem('userEmail');
        if (email) document.getElementById('email').value = email;
        const gender = localStorage.getItem('userGender');
        if (gender) document.getElementById('gender').value = gender;

        // Load birthday
        const bday = localStorage.getItem('userBirthday');
        if (bday) {
            const parts = bday.split('/');
            if (parts.length === 3) {
                document.getElementById('bDay').value = parts[0];
                document.getElementById('bMonth').value = parts[1];
                document.getElementById('bYear').value = parts[2];
            }
        }

        updateNameDisplay(name, nick);
    });
</script>
</body>
</html>
