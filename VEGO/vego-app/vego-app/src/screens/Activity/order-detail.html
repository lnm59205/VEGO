<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VeGo - Chi tiết đơn hàng</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .phone-frame {
            width: 375px;
            height: 812px;
            background: #000;
            border-radius: 40px;
            padding: 8px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.4);
            position: relative;
            transform: scale(0.8);
            transform-origin: center center;
            flex-shrink: 0;
            margin: -81px 0;
        }

        .phone-screen {
            width: 100%;
            height: 100%;
            background: #F5F5F5;
            border-radius: 32px;
            overflow-y: auto;
            position: relative;
            scrollbar-width: none;
            -ms-overflow-style: none;
        }

        .phone-screen::-webkit-scrollbar {
            display: none;
        }

        /* Status Bar */
        .status-bar {
            padding: 12px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 15px;
            font-weight: 600;
            background: white;
        }

        .status-icons {
            display: flex;
            gap: 4px;
        }

        /* Header */
        .header {
            background: white;
            padding: 16px 20px;
            display: flex;
            align-items: center;
            gap: 16px;
            border-bottom: 1px solid #F0F0F0;
        }

        .back-btn {
            width: 36px;
            height: 36px;
            background: transparent;
            border: none;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
        }

        .header-title {
            flex: 1;
            font-size: 18px;
            font-weight: 600;
            color: #333;
            text-align: center;
        }

        .share-btn {
            width: 36px;
            height: 36px;
            background: transparent;
            border: none;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
        }

        /* Content */
        .content {
            padding: 24px 20px 100px;
        }

        /* Status Section */
        .status-section {
            background: white;
            border-radius: 16px;
            padding: 24px;
            text-align: center;
            margin-bottom: 16px;
        }

        .status-icon {
            width: 80px;
            height: 80px;
            margin: 0 auto 16px;
            border-radius: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 40px;
        }

        .status-icon.completed {
            background: #E8F8ED;
        }

        .status-icon.approved {
            background: #FFF9C4;
        }

        .status-icon.coming {
            background: #E3F2FD;
        }

        .status-icon.finding {
            background: #FFF4ED;
        }

        .status-title {
            font-size: 20px;
            font-weight: 700;
            margin-bottom: 8px;
        }

        .status-title.completed {
            color: #4CAF50;
        }

        .status-title.approved {
            color: #F57C00;
        }

        .status-title.coming {
            color: #2196F3;
        }

        .status-title.finding {
            color: #FF6B35;
        }

        .order-code {
            font-size: 14px;
            color: #999;
        }

        .order-code strong {
            color: #333;
        }

        /* Info Section */
        .info-section {
            background: white;
            border-radius: 16px;
            padding: 20px;
            margin-bottom: 16px;
        }

        .info-item {
            display: flex;
            gap: 12px;
            padding: 12px 0;
            border-bottom: 1px solid #F5F5F5;
        }

        .info-item:last-child {
            border-bottom: none;
        }

        .info-icon {
            width: 24px;
            height: 24px;
            color: #999;
            flex-shrink: 0;
        }

        .info-content {
            flex: 1;
        }

        .info-label {
            font-size: 12px;
            color: #999;
            text-transform: uppercase;
            margin-bottom: 4px;
        }

        .info-value {
            font-size: 14px;
            color: #333;
            line-height: 1.4;
        }

        /* Items Section */
        .items-section {
            background: white;
            border-radius: 16px;
            padding: 20px;
            margin-bottom: 16px;
        }

        .section-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 16px;
        }

        .section-title {
            font-size: 16px;
            font-weight: 600;
            color: #333;
        }

        .item-count {
            padding: 4px 12px;
            background: #75FF93;
            border-radius: 12px;
            font-size: 12px;
            font-weight: 600;
            color: #333;
        }

        .item-card {
            display: flex;
            gap: 12px;
            padding: 12px 0;
            border-bottom: 1px solid #F5F5F5;
            align-items: center;
        }

        .item-card:last-child {
            border-bottom: none;
        }

        .item-image {
            width: 60px;
            height: 60px;
            border-radius: 8px;
            object-fit: cover;
            flex-shrink: 0;
        }

        .item-info {
            flex: 1;
            min-width: 0;
        }

        .item-name {
            font-size: 15px;
            font-weight: 600;
            color: #333;
            margin-bottom: 4px;
        }

        .item-weight {
            font-size: 13px;
            color: #999;
        }

        .item-price {
            font-size: 14px;
            font-weight: 700;
            color: #333;
            text-align: right;
            flex-shrink: 0;
            min-width: 95px;
            white-space: nowrap;
        }

        /* Total Section */
        .total-section {
            background: #FFF4ED;
            border-radius: 12px;
            padding: 16px;
            margin-top: 16px;
        }

        .total-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .total-label {
            font-size: 13px;
            color: #999;
        }

        .total-note {
            font-size: 11px;
            color: #999;
            margin-top: 4px;
        }

        .total-amount {
            font-size: 20px;
            font-weight: 700;
            color: #75FF93;
            white-space: nowrap;
            min-width: 110px;
            text-align: right;
        }

        /* Rating Section */
        .rating-section {
            background: white;
            border-radius: 16px;
            padding: 20px;
            text-align: center;
            margin-bottom: 16px;
        }

        .rating-title {
            font-size: 16px;
            font-weight: 600;
            color: #333;
            margin-bottom: 16px;
        }

        .stars {
            display: flex;
            justify-content: center;
            gap: 8px;
            margin-bottom: 12px;
        }

        .star {
            font-size: 32px;
            cursor: pointer;
            transition: all 0.2s ease;
            filter: grayscale(100%);
            opacity: 0.3;
        }

        .star.active {
            filter: grayscale(0%);
            opacity: 1;
            transform: scale(1.1);
        }

        .star:hover {
            transform: scale(1.2);
        }

        .rating-note {
            font-size: 13px;
            color: #999;
            font-style: italic;
            min-height: 20px;
        }

        /* Action Buttons */
        .action-buttons {
            display: flex;
            gap: 12px;
            margin-top: 16px;
        }

        .btn {
            flex: 1;
            height: 52px;
            border: none;
            border-radius: 26px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            transition: all 0.2s ease;
        }

        .btn-secondary {
            background: white;
            color: #FF6B35;
            border: 2px solid #FF6B35;
        }

        .btn-secondary:hover {
            background: #FFF4ED;
        }

        .btn-primary {
            background: #FF6B35;
            color: white;
        }

        .btn-primary:hover {
            background: #E55A2B;
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(255, 107, 53, 0.3);
        }

        .btn-primary:disabled {
            background: #CCC;
            cursor: not-allowed;
        }

        /* Modal Overlay */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.5);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            animation: fadeIn 0.2s ease;
        }

        .modal-overlay.show {
            display: flex;
        }

        /* Modal Content */
        .modal-content {
            background: white;
            border-radius: 20px;
            padding: 24px;
            width: 320px;
            max-width: 90%;
            text-align: center;
            animation: slideUp 0.3s ease;
        }

        @keyframes slideUp {
            from {
                transform: translateY(20px);
                opacity: 0;
            }
            to {
                transform: translateY(0);
                opacity: 1;
            }
        }

        .modal-icon {
            width: 60px;
            height: 60px;
            background: #FFF4ED;
            border-radius: 30px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 16px;
            font-size: 30px;
        }

        .modal-title {
            font-size: 18px;
            font-weight: 700;
            color: #333;
            margin-bottom: 8px;
        }

        .modal-message {
            font-size: 14px;
            color: #666;
            line-height: 1.5;
            margin-bottom: 24px;
        }

        .modal-buttons {
            display: flex;
            gap: 12px;
        }

        .modal-btn {
            flex: 1;
            height: 48px;
            border: none;
            border-radius: 24px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .modal-btn-cancel {
            background: #F5F5F5;
            color: #666;
        }

        .modal-btn-cancel:hover {
            background: #E0E0E0;
        }

        .modal-btn-confirm {
            background: #FF6B35;
            color: white;
        }

        .modal-btn-confirm:hover {
            background: #E55A2B;
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(255, 107, 53, 0.3);
        }
    </style>
</head>
<body>
    <div class="phone-frame">
        <div class="phone-screen">
            <!-- Status Bar -->
            <div class="status-bar">
                <div>9:41</div>
                <div class="status-icons">
                    <span>📶</span>
                    <span>📶</span>
                    <span>🔋</span>
                </div>
            </div>

            <!-- Header -->
            <div class="header">
                <button class="back-btn" onclick="goBack()">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none">
                        <path d="M15 18l-6-6 6-6" stroke="#333" stroke-width="2" stroke-linecap="round"/>
                    </svg>
                </button>
                <div class="header-title">Chi tiết đơn hàng</div>
                <button class="share-btn">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none">
                        <path d="M18 8a3 3 0 1 0 0-6 3 3 0 0 0 0 6zM6 15a3 3 0 1 0 0-6 3 3 0 0 0 0 6zM18 22a3 3 0 1 0 0-6 3 3 0 0 0 0 6zM8.59 13.51l6.83 3.98M15.41 6.51l-6.82 3.98" stroke="#333" stroke-width="2" stroke-linecap="round"/>
                    </svg>
                </button>
            </div>

            <!-- Content -->
            <div class="content" id="orderContent">
                <!-- Content will be loaded dynamically -->
            </div>

            <!-- Cancel Order Modal -->
            <div class="modal-overlay" id="cancelModal">
                <div class="modal-content">
                    <div class="modal-icon">⚠️</div>
                    <div class="modal-title">Xác nhận hủy đơn</div>
                    <div class="modal-message">Bạn có chắc chắn muốn hủy đơn hàng này không? Hành động này không thể hoàn tác.</div>
                    <div class="modal-buttons">
                        <button class="modal-btn modal-btn-cancel" onclick="closeModal()">Quay lại</button>
                        <button class="modal-btn modal-btn-confirm" onclick="confirmCancel()">Chắc chắn</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // Get status from URL parameter or default to 'completed'
        const urlParams = new URLSearchParams(window.location.search);
        const status = urlParams.get('status') || 'completed';
        
        let currentRating = 0;
        
        // Rating texts for each star
        const ratingTexts = {
            1: "Rất tệ - Chúng tôi sẽ cải thiện!",
            2: "Tệ - Cần cải thiện nhiều hơn",
            3: "Bình thường - Chúng tôi có thể làm tốt hơn",
            4: "Tốt - Cảm ơn bạn đã tin tưởng!",
            5: "Tuyệt vời - Cảm ơn bạn rất nhiều!"
        };

        // Order data templates
        const orderData = {
            completed: {
                icon: '✓',
                iconClass: 'completed',
                title: 'Đã hoàn thành',
                titleClass: 'completed',
                code: '#VG-9928341',
                time: '14:00 01/01/2026',
                address: '123 Đường Nguyễn Huệ, Phường Bến Nghé, Quận 1, TP. Hồ Chí Minh',
                items: [
                    { name: 'Giấy báo cũ', weight: '3kg×7.000đ', price: '35.000 đ', image: '../../assets/images/giaybaocu.png' }
                ],
                total: '35.000 đ',
                showRating: true,
                buttons: [
                    { text: 'Liên hệ hỗ trợ', type: 'secondary' }
                ]
            },
            approved: {
                icon: '⏳',
                iconClass: 'approved',
                title: 'Đang duyệt',
                titleClass: 'approved',
                code: '#VG-00003',
                time: '09:30 - 24 Tháng 5, 2023',
                address: '123 Đường Nguyễn Huệ, Phường Bến Nghé, Quận 1, TP. Hồ Chí Minh',
                items: [
                    { name: 'Sắt vụn & Nhựa', weight: '2kg×12.000đ', price: '24.000 đ', image: '../../assets/images/satvun.png' }
                ],
                total: '24.000 đ',
                showRating: false,
                buttons: [
                    { text: 'Liên hệ', type: 'secondary' },
                    { text: 'Hủy đơn', type: 'primary' }
                ]
            },
            coming: {
                icon: '🚚',
                iconClass: 'coming',
                title: 'Người thu gom đang đến',
                titleClass: 'coming',
                code: '#VG-00002',
                time: '09:30 - 24 Tháng 5, 2023',
                address: '123 Đường Nguyễn Huệ, Phường Bến Nghé, Quận 1, TP. Hồ Chí Minh',
                items: [
                    { name: 'Vỏ lon bia', weight: '3kg×35.000đ', price: '105.000 đ', image: '../../assets/images/volonbia.png' }
                ],
                total: '105.000 đ',
                showRating: false,
                buttons: [
                    { text: 'Liên hệ', type: 'secondary' }
                ]
            },
            finding: {
                icon: '⏳',
                iconClass: 'finding',
                title: 'Đang tìm người thu gom',
                titleClass: 'finding',
                code: '#VG-00001',
                time: '09:30 - 24 Tháng 5, 2023',
                address: '123 Đường Nguyễn Huệ, Phường Bến Nghé, Quận 1, TP. Hồ Chí Minh',
                items: [
                    { name: 'Giấy vụn', weight: '7kg×5.000đ', price: '35.000 đ', image: '../../assets/images/giaybaocu.png' }
                ],
                total: '35.000 đ',
                showRating: false,
                buttons: [
                    { text: 'Liên hệ', type: 'secondary' }
                ]
            }
        };

        // Load order content
        function loadOrderContent() {
            // Check if this is a custom order from activity page
            const customOrderData = sessionStorage.getItem('currentOrderDetail');
            
            if (customOrderData && urlParams.get('custom') === 'true') {
                loadCustomOrder(JSON.parse(customOrderData));
            } else {
                loadDefaultOrder();
            }
        }

        function loadCustomOrder(orderData) {
            const content = document.getElementById('orderContent');
            
            let html = `
                <!-- Status Section -->
                <div class="status-section">
                    <div class="status-icon ${orderData.statusClass.replace('status-', '')}">${orderData.statusIcon}</div>
                    <div class="status-title ${orderData.statusClass.replace('status-', '')}">${orderData.statusText}</div>
                    <div class="order-code">Mã đơn hàng: <strong>${orderData.orderCode}</strong></div>
                </div>

                <!-- Info Section -->
                <div class="info-section">
                    <div class="info-item">
                        <div class="info-icon">📅</div>
                        <div class="info-content">
                            <div class="info-label">Thời gian đặt</div>
                            <div class="info-value">${new Date(orderData.timestamp).toLocaleString('vi-VN')}</div>
                        </div>
                    </div>
                    <div class="info-item">
                        <div class="info-icon">📍</div>
                        <div class="info-content">
                            <div class="info-label">Địa điểm thu gom</div>
                            <div class="info-value">${orderData.locationName}<br>${orderData.locationAddress}</div>
                        </div>
                    </div>
                    <div class="info-item">
                        <div class="info-icon">🚛</div>
                        <div class="info-content">
                            <div class="info-label">Phương thức</div>
                            <div class="info-value">${orderData.method}</div>
                        </div>
                    </div>
                </div>

                <!-- Items Section -->
                <div class="items-section">
                    <div class="section-header">
                        <div class="section-title">Chi tiết phế liệu</div>
                        <div class="item-count">${orderData.materials.length} Loại</div>
                    </div>
            `;

            orderData.materials.forEach(item => {
                html += `
                    <div class="item-card">
                        <img src="${item.image}" 
                             alt="${item.name}" 
                             class="item-image"
                             onerror="this.src='../../../assets/images/giaybaocu.png'">
                        <div class="item-info">
                            <div class="item-name">${item.name}</div>
                            <div class="item-weight">${item.weight}kg × ${item.price.toLocaleString('vi-VN')}đ/kg</div>
                        </div>
                        <div class="item-price">${item.total.toLocaleString('vi-VN')} đ</div>
                    </div>
                `;
            });

            html += `
                    <div class="total-section">
                        <div class="total-row">
                            <div>
                                <div class="total-label">TỔNG GIÁ TRỊ ƯỚC TÍNH</div>
                                <div class="total-note">*Giá thực tế có thể thay đổi</div>
                            </div>
                            <div class="total-amount">${orderData.total.toLocaleString('vi-VN')} đ</div>
                        </div>
                    </div>
                </div>
            `;

            // Add buttons based on status
            html += `<div class="action-buttons">`;
            html += `<button class="btn btn-secondary" onclick="openChat()">Liên hệ</button>`;
            if (orderData.status === 'approved') {
                html += `<button class="btn btn-primary" onclick="showCancelModal()">Hủy đơn</button>`;
            }
            html += `</div>`;

            content.innerHTML = html;
        }

        function loadDefaultOrder() {
            const data = orderData[status];
            const content = document.getElementById('orderContent');
            
            let html = `
                <!-- Status Section -->
                <div class="status-section">
                    <div class="status-icon ${data.iconClass}">${data.icon}</div>
                    <div class="status-title ${data.titleClass}">${data.title}</div>
                    <div class="order-code">Mã đơn hàng: <strong>${data.code}</strong></div>
                </div>

                <!-- Info Section -->
                <div class="info-section">
                    <div class="info-item">
                        <div class="info-icon">📅</div>
                        <div class="info-content">
                            <div class="info-label">Thời gian bắt</div>
                            <div class="info-value">${data.time}</div>
                        </div>
                    </div>
                    <div class="info-item">
                        <div class="info-icon">📍</div>
                        <div class="info-content">
                            <div class="info-label">Địa điểm thu gom</div>
                            <div class="info-value">${data.address}</div>
                        </div>
                    </div>
                </div>

                <!-- Items Section -->
                <div class="items-section">
                    <div class="section-header">
                        <div class="section-title">Chi tiết phế liệu</div>
                        <div class="item-count">${data.items.length} Loại</div>
                    </div>
            `;

            data.items.forEach(item => {
                html += `
                    <div class="item-card">
                        <img src="${item.image}" alt="${item.name}" class="item-image">
                        <div class="item-info">
                            <div class="item-name">${item.name}</div>
                            <div class="item-weight">${item.weight}</div>
                        </div>
                        <div class="item-price">${item.price}</div>
                    </div>
                `;
            });

            html += `
                    <div class="total-section">
                        <div class="total-row">
                            <div>
                                <div class="total-label">TỔNG GIÁ TRỊ ƯỚC TÍNH</div>
                                <div class="total-note">*Giá thực tế có thể thay đổi</div>
                            </div>
                            <div class="total-amount">${data.total}</div>
                        </div>
                    </div>
                </div>
            `;

            if (data.showRating) {
                html += `
                    <!-- Rating Section -->
                    <div class="rating-section">
                        <div class="rating-title">Đánh giá dịch vụ</div>
                        <div class="stars">
                            <span class="star" onclick="setRating(1)">⭐</span>
                            <span class="star" onclick="setRating(2)">⭐</span>
                            <span class="star" onclick="setRating(3)">⭐</span>
                            <span class="star" onclick="setRating(4)">⭐</span>
                            <span class="star" onclick="setRating(5)">⭐</span>
                        </div>
                        <div class="rating-note" id="ratingText"></div>
                    </div>
                `;
            }

            html += `<div class="action-buttons">`;
            data.buttons.forEach(btn => {
                const disabled = btn.disabled ? 'disabled' : '';
                let onclick = '';
                if (btn.text === 'Hủy đơn') {
                    onclick = 'onclick="showCancelModal()"';
                } else if (btn.text.includes('Liên hệ hỗ trợ')) {
                    onclick = 'onclick="contactSupport()"';
                } else if (btn.text.includes('Liên hệ')) {
                    onclick = 'onclick="openChat()"';
                }
                html += `
                    <button class="btn btn-${btn.type}" ${disabled} ${onclick}>
                        ${btn.text}
                    </button>
                `;
            });
            html += `</div>`;

            content.innerHTML = html;
        }

        function setRating(rating) {
            currentRating = rating;
            
            const stars = document.querySelectorAll('.star');
            stars.forEach((star, index) => {
                if (index < rating) {
                    star.classList.add('active');
                } else {
                    star.classList.remove('active');
                }
            });
            
            // Update rating text
            const ratingTextElement = document.getElementById('ratingText');
            if (ratingTextElement) {
                ratingTextElement.textContent = `"${ratingTexts[rating]}"`;
            }
        }

        function goBack() {
            document.body.style.transition = 'opacity 0.3s ease';
            document.body.style.opacity = '0';
            
            setTimeout(() => {
                window.location.href = 'activity.html';
            }, 300);
        }

        function showCancelModal() {
            document.getElementById('cancelModal').classList.add('show');
        }

        function closeModal() {
            document.getElementById('cancelModal').classList.remove('show');
        }

        function confirmCancel() {
            // Check if this is a custom order
            const customOrderData = sessionStorage.getItem('currentOrderDetail');
            
            if (customOrderData && urlParams.get('custom') === 'true') {
                // Remove from allOrders array
                const order = JSON.parse(customOrderData);
                let allOrders = JSON.parse(sessionStorage.getItem('allOrders') || '[]');
                allOrders = allOrders.filter(o => o.id !== order.id);
                sessionStorage.setItem('allOrders', JSON.stringify(allOrders));
                sessionStorage.removeItem('currentOrderDetail');
            } else {
                // Save canceled order to sessionStorage for default orders
                sessionStorage.setItem('canceledOrder', status);
            }
            
            // Close modal
            closeModal();
            
            // Show fade out animation
            document.body.style.transition = 'opacity 0.3s ease';
            document.body.style.opacity = '0';
            
            // Navigate back to activity page after canceling
            setTimeout(() => {
                window.location.href = 'activity.html';
            }, 300);
        }

        function openChat() {
            // Get order data to pass shop info to chat
            const customOrderData = sessionStorage.getItem('currentOrderDetail');
            
            if (customOrderData) {
                const order = JSON.parse(customOrderData);
                localStorage.setItem('chatShop', JSON.stringify({
                    name: order.locationName,
                    phone: '0123456789'
                }));
            }
            
            // Add fade out animation
            document.body.style.transition = 'opacity 0.3s ease';
            document.body.style.opacity = '0';
            
            setTimeout(() => {
                window.location.href = '../Home/messages.html';
            }, 300);
        }
        
        // Contact support - Open chat with support team
        function contactSupport() {
            // Save support chat info
            localStorage.setItem('chatShop', JSON.stringify({
                name: 'Tổng đài VeGo',
                phone: '1900 xxxx',
                isSupport: true
            }));
            
            // Navigate to chat
            document.body.style.transition = 'opacity 0.3s ease';
            document.body.style.opacity = '0';
            
            setTimeout(() => {
                window.location.href = '../Home/messages.html';
            }, 300);
        }

        // Load content on page load
        window.onload = loadOrderContent;
    </script>
</body>
</html>
