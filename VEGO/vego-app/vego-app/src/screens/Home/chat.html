<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VeGo - Chat</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .phone-frame {
            width: 375px;
            height: 812px;
            background: #000;
            border-radius: 40px;
            padding: 8px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.4);
            position: relative;
            transform: scale(0.8);
            transform-origin: center center;
            flex-shrink: 0;
            margin: -81px 0;
        }

        .phone-screen {
            width: 100%;
            height: 100%;
            background: #F5F5F5;
            border-radius: 32px;
            overflow: hidden;
            position: relative;
            display: flex;
            flex-direction: column;
        }

        /* Status Bar */
        .status-bar {
            padding: 12px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 15px;
            font-weight: 600;
            background: white;
        }

        .status-icons {
            display: flex;
            gap: 4px;
        }

        /* Header */
        .header {
            background: white;
            padding: 12px 20px;
            display: flex;
            align-items: center;
            gap: 12px;
            border-bottom: 1px solid #F0F0F0;
        }

        .back-btn {
            width: 36px;
            height: 36px;
            background: transparent;
            border: none;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
        }

        .location-avatar {
            width: 44px;
            height: 44px;
            background: #75FF93;
            border-radius: 22px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            flex-shrink: 0;
        }

        .location-info {
            flex: 1;
        }

        .location-name {
            font-size: 16px;
            font-weight: 600;
            color: #333;
        }

        .location-status {
            font-size: 12px;
            color: #4CAF50;
        }

        /* Chat Messages */
        .chat-container {
            flex: 1;
            overflow-y: auto;
            padding: 16px 20px;
            scrollbar-width: none;
            -ms-overflow-style: none;
        }

        .chat-container::-webkit-scrollbar {
            display: none;
        }

        .date-divider {
            text-align: center;
            margin: 16px 0;
        }

        .date-text {
            display: inline-block;
            padding: 4px 12px;
            background: rgba(0, 0, 0, 0.1);
            border-radius: 12px;
            font-size: 12px;
            color: #666;
        }

        .message {
            display: flex;
            margin-bottom: 12px;
            animation: slideIn 0.3s ease;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .message.sent {
            justify-content: flex-end;
        }

        .message.received {
            justify-content: flex-start;
        }

        .message-bubble {
            max-width: 70%;
            padding: 12px 16px;
            border-radius: 18px;
            position: relative;
        }

        .message.sent .message-bubble {
            background: #75FF93;
            color: #333;
            border-bottom-right-radius: 4px;
        }

        .message.received .message-bubble {
            background: white;
            color: #333;
            border-bottom-left-radius: 4px;
        }

        .message-text {
            font-size: 15px;
            line-height: 1.4;
            word-wrap: break-word;
        }

        .message-time {
            font-size: 11px;
            color: #999;
            margin-top: 4px;
            text-align: right;
        }

        .message.received .message-time {
            text-align: left;
        }

        /* Quick Replies */
        .quick-replies {
            padding: 12px 20px;
            background: white;
            border-top: 1px solid #F0F0F0;
            display: flex;
            gap: 8px;
            overflow-x: auto;
            scrollbar-width: none;
            -ms-overflow-style: none;
        }

        .quick-replies::-webkit-scrollbar {
            display: none;
        }

        .quick-reply-btn {
            padding: 8px 16px;
            background: #F5F5F5;
            border: 1px solid #E0E0E0;
            border-radius: 20px;
            font-size: 14px;
            color: #333;
            white-space: nowrap;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .quick-reply-btn:hover {
            background: #75FF93;
            border-color: #75FF93;
        }

        /* Input Area */
        .input-area {
            padding: 12px 20px;
            background: white;
            border-top: 1px solid #F0F0F0;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .attach-btn {
            width: 36px;
            height: 36px;
            background: transparent;
            border: none;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            color: #666;
        }

        .message-input {
            flex: 1;
            padding: 10px 16px;
            background: #F5F5F5;
            border: none;
            border-radius: 20px;
            font-size: 15px;
            outline: none;
        }

        .send-btn {
            width: 36px;
            height: 36px;
            background: #75FF93;
            border: none;
            border-radius: 18px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .send-btn:hover {
            transform: scale(1.1);
        }

        .send-btn:disabled {
            background: #E0E0E0;
            cursor: not-allowed;
        }
    </style>
</head>
<body>
    <div class="phone-frame">
        <div class="phone-screen">
            <!-- Status Bar -->
            <div class="status-bar">
                <div>9:41</div>
                <div class="status-icons">
                    <span>📶</span>
                    <span>📶</span>
                    <span>🔋</span>
                </div>
            </div>

            <!-- Header -->
            <div class="header">
                <button class="back-btn" onclick="goBack()">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none">
                        <path d="M15 18l-6-6 6-6" stroke="#333" stroke-width="2" stroke-linecap="round"/>
                    </svg>
                </button>
                <div class="location-avatar">🏪</div>
                <div class="location-info">
                    <div class="location-name" id="locationName">Vựa ve chai Hà Đông</div>
                    <div class="location-status">● Đang hoạt động</div>
                </div>
            </div>

            <!-- Chat Container -->
            <div class="chat-container" id="chatContainer">
                <div class="date-divider">
                    <span class="date-text">Hôm nay</span>
                </div>
            </div>

            <!-- Quick Replies -->
            <div class="quick-replies">
                <button class="quick-reply-btn" onclick="sendQuickReply('Giá hôm nay?')">Giá hôm nay?</button>
                <button class="quick-reply-btn" onclick="sendQuickReply('Địa chỉ ở đâu?')">Địa chỉ ở đâu?</button>
                <button class="quick-reply-btn" onclick="sendQuickReply('Mở cửa mấy giờ?')">Mở cửa mấy giờ?</button>
            </div>

            <!-- Input Area -->
            <div class="input-area">
                <button class="attach-btn">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="currentColor">
                        <path d="M19 13h-6v6h-2v-6H5v-2h6V5h2v6h6v2z"/>
                    </svg>
                </button>
                <input type="text" class="message-input" id="messageInput" placeholder="Nhập tin nhắn..." />
                <button class="send-btn" id="sendBtn" onclick="sendMessage()">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="white">
                        <path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/>
                    </svg>
                </button>
            </div>
        </div>
    </div>

    <script>
        let currentShopId = null;
        
        // Load location data and chat history
        window.onload = function() {
            // Get shop info (chatShop từ localStorage, còn lại từ sessionStorage)
            const chatShop = localStorage.getItem('chatShop');
            const orderData = sessionStorage.getItem('currentOrderDetail');
            const locationData = sessionStorage.getItem('selectedLocation');
            
            let shopName = 'Vựa ve chai Hà Đông';
            let isSupport = false;
            
            if (chatShop) {
                const shop = JSON.parse(chatShop);
                shopName = shop.name;
                currentShopId = shop.name; // Use shop name as ID
                isSupport = shop.isSupport || false;
            } else if (orderData) {
                const order = JSON.parse(orderData);
                shopName = order.locationName;
                currentShopId = order.locationName;
            } else if (locationData) {
                const location = JSON.parse(locationData);
                shopName = location.title;
                currentShopId = location.title;
            }
            
            document.getElementById('locationName').textContent = shopName;
            
            // Load chat history for this shop
            loadChatHistory();
            
            // If no messages, send welcome message
            const messages = getChatHistory();
            if (messages.length === 0) {
                sendWelcomeMessage(isSupport);
            }
            
            // Scroll to bottom
            scrollToBottom();
        };

        // Get chat history for current shop
        function getChatHistory() {
            const key = `chat_${currentShopId}`;
            const history = localStorage.getItem(key);
            return history ? JSON.parse(history) : [];
        }

        // Save chat history for current shop (localStorage để giữ sau khi thoát)
        function saveChatHistory(messages) {
            const key = `chat_${currentShopId}`;
            localStorage.setItem(key, JSON.stringify(messages));
            
            // Cập nhật danh sách cuộc trò chuyện
            updateConversationList(messages);
        }
        
        // Cập nhật danh sách cuộc trò chuyện trong localStorage
        function updateConversationList(messages) {
            if (!currentShopId || messages.length === 0) return;
            
            const lastMsg = messages[messages.length - 1];
            const conversations = JSON.parse(localStorage.getItem('conversations') || '[]');
            
            const idx = conversations.findIndex(c => c.shopId === currentShopId);
            const entry = {
                shopId: currentShopId,
                shopName: document.getElementById('locationName').textContent,
                lastMessage: lastMsg.text,
                lastTime: lastMsg.time,
                timestamp: Date.now()
            };
            
            if (idx >= 0) {
                conversations[idx] = entry;
            } else {
                conversations.unshift(entry);
            }
            
            localStorage.setItem('conversations', JSON.stringify(conversations));
        }

        // Load chat history from sessionStorage
        function loadChatHistory() {
            const messages = getChatHistory();
            const chatContainer = document.getElementById('chatContainer');
            
            messages.forEach(msg => {
                const messageDiv = document.createElement('div');
                messageDiv.className = `message ${msg.type}`;
                messageDiv.innerHTML = `
                    <div class="message-bubble">
                        <div class="message-text">${msg.text.replace(/\n/g, '<br>')}</div>
                        <div class="message-time">${msg.time}</div>
                    </div>
                `;
                chatContainer.appendChild(messageDiv);
            });
        }

        // Send welcome message from shop
        function sendWelcomeMessage(isSupport = false) {
            let welcomeText = 'Xin chào! Chúng tôi có thể giúp gì cho bạn?';
            
            if (isSupport) {
                welcomeText = 'Xin chào! Đây là tổng đài hỗ trợ VeGo. Chúng tôi có thể giúp gì cho bạn?';
            }
            
            const welcomeMsg = {
                type: 'received',
                text: welcomeText,
                time: getCurrentTime()
            };
            
            const messageDiv = document.createElement('div');
            messageDiv.className = 'message received';
            messageDiv.innerHTML = `
                <div class="message-bubble">
                    <div class="message-text">${welcomeMsg.text}</div>
                    <div class="message-time">${welcomeMsg.time}</div>
                </div>
            `;
            
            const chatContainer = document.getElementById('chatContainer');
            chatContainer.appendChild(messageDiv);
            
            // Save to history
            const messages = getChatHistory();
            messages.push(welcomeMsg);
            saveChatHistory(messages);
            
            scrollToBottom();
        }

        const messageInput = document.getElementById('messageInput');
        const sendBtn = document.getElementById('sendBtn');
        const chatContainer = document.getElementById('chatContainer');

        // Enable/disable send button based on input
        messageInput.addEventListener('input', function() {
            sendBtn.disabled = this.value.trim() === '';
        });

        // Send message on Enter key
        messageInput.addEventListener('keypress', function(e) {
            if (e.key === 'Enter' && this.value.trim() !== '') {
                sendMessage();
            }
        });

        function sendMessage() {
            const text = messageInput.value.trim();
            if (text === '') return;

            // Create message object
            const userMsg = {
                type: 'sent',
                text: text,
                time: getCurrentTime()
            };

            // Create message element
            const messageDiv = document.createElement('div');
            messageDiv.className = 'message sent';
            messageDiv.innerHTML = `
                <div class="message-bubble">
                    <div class="message-text">${escapeHtml(text)}</div>
                    <div class="message-time">${userMsg.time}</div>
                </div>
            `;

            // Add to chat
            chatContainer.appendChild(messageDiv);
            
            // Save to history
            const messages = getChatHistory();
            messages.push(userMsg);
            saveChatHistory(messages);

            // Clear input
            messageInput.value = '';
            sendBtn.disabled = true;

            // Scroll to bottom
            scrollToBottom();

            // Simulate response after 1 second
            setTimeout(() => {
                sendAutoReply(text);
            }, 1000);
        }

        function sendQuickReply(text) {
            messageInput.value = text;
            sendMessage();
        }

        function sendAutoReply(userMessage) {
            // Get location data
            const orderData = sessionStorage.getItem('currentOrderDetail');
            const locationData = sessionStorage.getItem('selectedLocation');
            const chatShop = localStorage.getItem('chatShop');
            
            let locationName = 'Vựa ve chai Hà Đông';
            let locationAddress = '123 Đường Nguyễn Trãi, Hà Đông, Hà Nội';
            let isSupport = false;
            
            if (chatShop) {
                const shop = JSON.parse(chatShop);
                locationName = shop.name;
                isSupport = shop.isSupport || false;
            } else if (orderData) {
                const order = JSON.parse(orderData);
                locationName = order.locationName;
                locationAddress = order.locationAddress;
            } else if (locationData) {
                const location = JSON.parse(locationData);
                locationName = location.title;
                locationAddress = location.address;
            }
            
            let replyText = 'Cảm ơn bạn đã liên hệ. Chúng tôi sẽ phản hồi sớm nhất có thể!';

            // Support responses
            if (isSupport) {
                if (userMessage.toLowerCase().includes('đơn hàng') || userMessage.toLowerCase().includes('giao dịch')) {
                    replyText = 'Bạn có thể kiểm tra trạng thái đơn hàng trong mục "Hoạt động". Nếu có vấn đề gì, vui lòng cung cấp mã đơn hàng để chúng tôi hỗ trợ tốt hơn.';
                } else if (userMessage.toLowerCase().includes('giá') || userMessage.toLowerCase().includes('thanh toán')) {
                    replyText = 'Giá thu mua phế liệu được cập nhật hàng ngày tại mỗi điểm thu gom. Bạn có thể xem giá chi tiết khi chọn điểm thu gom trên bản đồ.';
                } else if (userMessage.toLowerCase().includes('tài khoản') || userMessage.toLowerCase().includes('đăng nhập')) {
                    replyText = 'Nếu bạn gặp vấn đề về tài khoản, vui lòng cung cấp số điện thoại đăng ký để chúng tôi kiểm tra và hỗ trợ.';
                } else if (userMessage.toLowerCase().includes('lỗi') || userMessage.toLowerCase().includes('không hoạt động')) {
                    replyText = 'Chúng tôi rất tiếc về sự bất tiện này. Vui lòng mô tả chi tiết vấn đề bạn gặp phải để đội ngũ kỹ thuật có thể hỗ trợ nhanh nhất.';
                } else {
                    replyText = 'Cảm ơn bạn đã liên hệ tổng đài VeGo. Chúng tôi sẽ phản hồi trong thời gian sớm nhất. Hotline: 1900 xxxx';
                }
            } else {
                // Shop responses
                if (userMessage.toLowerCase().includes('giá')) {
                    replyText = 'Bảng giá hôm nay:\n- Giấy: 5.000đ/kg\n- Nhựa: 3.000đ/kg\n- Sắt: 6.000đ/kg\n- Nhôm: 30.000đ/kg';
                } else if (userMessage.toLowerCase().includes('địa chỉ') || userMessage.toLowerCase().includes('ở đâu')) {
                    replyText = `Địa chỉ của ${locationName}:\n${locationAddress}`;
                } else if (userMessage.toLowerCase().includes('giờ') || userMessage.toLowerCase().includes('mở')) {
                    replyText = 'Chúng tôi mở cửa từ 7:00 - 18:00 hàng ngày, kể cả cuối tuần!';
                }
            }

            // Create reply object
            const replyMsg = {
                type: 'received',
                text: replyText,
                time: getCurrentTime()
            };

            const messageDiv = document.createElement('div');
            messageDiv.className = 'message received';
            messageDiv.innerHTML = `
                <div class="message-bubble">
                    <div class="message-text">${replyText.replace(/\n/g, '<br>')}</div>
                    <div class="message-time">${replyMsg.time}</div>
                </div>
            `;

            chatContainer.appendChild(messageDiv);
            
            // Save to history
            const messages = getChatHistory();
            messages.push(replyMsg);
            saveChatHistory(messages);
            
            scrollToBottom();
        }

        function getCurrentTime() {
            const now = new Date();
            const hours = String(now.getHours()).padStart(2, '0');
            const minutes = String(now.getMinutes()).padStart(2, '0');
            return `${hours}:${minutes}`;
        }

        function scrollToBottom() {
            chatContainer.scrollTop = chatContainer.scrollHeight;
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        function goBack() {
            document.body.style.transition = 'opacity 0.3s ease';
            document.body.style.opacity = '0';
            
            setTimeout(() => {
                window.history.back();
            }, 300);
        }
    </script>
</body>
</html>
