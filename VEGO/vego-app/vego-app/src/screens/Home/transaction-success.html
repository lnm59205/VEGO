<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VeGo - Giao dịch thành công</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .phone-frame {
            width: 375px;
            height: 812px;
            background: #000;
            border-radius: 40px;
            padding: 8px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.4);
            position: relative;
            transform: scale(0.8);
            transform-origin: center center;
            flex-shrink: 0;
            margin: -81px 0;
        }

        .phone-screen {
            width: 100%;
            height: 100%;
            background: #FFFFFF;
            border-radius: 32px;
            overflow-y: auto;
            position: relative;
            scrollbar-width: none;
            -ms-overflow-style: none;
            display: flex;
            flex-direction: column;
        }

        .phone-screen::-webkit-scrollbar {
            display: none;
        }

        /* Status Bar */
        .status-bar {
            padding: 12px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 15px;
            font-weight: 600;
        }

        .status-icons {
            display: flex;
            gap: 4px;
        }

        /* Content */
        .content {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 40px 20px 20px;
        }

        /* Success Icon */
        .success-icon {
            width: 120px;
            height: 120px;
            background: linear-gradient(135deg, #75FF93 0%, #5EE87A 100%);
            border-radius: 60px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 32px;
            position: relative;
            animation: scaleIn 0.5s ease;
        }

        @keyframes scaleIn {
            0% {
                transform: scale(0);
            }
            50% {
                transform: scale(1.1);
            }
            100% {
                transform: scale(1);
            }
        }

        .success-icon::before {
            content: '';
            position: absolute;
            width: 140px;
            height: 140px;
            background: rgba(117, 255, 147, 0.2);
            border-radius: 70px;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% {
                transform: scale(1);
                opacity: 1;
            }
            50% {
                transform: scale(1.1);
                opacity: 0.5;
            }
        }

        .checkmark {
            width: 50px;
            height: 50px;
            position: relative;
            z-index: 1;
        }

        .checkmark path {
            stroke: white;
            stroke-width: 4;
            stroke-linecap: round;
            stroke-linejoin: round;
            fill: none;
            stroke-dasharray: 100;
            stroke-dashoffset: 100;
            animation: draw 0.5s ease 0.3s forwards;
        }

        @keyframes draw {
            to {
                stroke-dashoffset: 0;
            }
        }

        /* Title */
        .title {
            font-size: 24px;
            font-weight: 700;
            color: #333;
            margin-bottom: 8px;
            text-align: center;
        }

        .subtitle {
            font-size: 14px;
            color: #999;
            text-align: center;
            margin-bottom: 32px;
        }

        /* Summary Card */
        .summary-card {
            width: 100%;
            background: white;
            border: 2px solid #75FF93;
            border-radius: 16px;
            padding: 20px;
            margin-bottom: 24px;
        }

        .total-section {
            text-align: center;
            padding-bottom: 16px;
            border-bottom: 1px solid #F0F0F0;
            margin-bottom: 16px;
        }

        .total-label {
            font-size: 12px;
            color: #999;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 8px;
        }

        .total-amount {
            font-size: 32px;
            font-weight: 700;
            color: #333;
        }

        /* Detail Items */
        .detail-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px 0;
            border-bottom: 1px solid #F5F5F5;
        }

        .detail-item:last-child {
            border-bottom: none;
        }

        .detail-icon {
            width: 40px;
            height: 40px;
            background: #F5F5F5;
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            flex-shrink: 0;
        }

        .detail-info {
            flex: 1;
        }

        .detail-label {
            font-size: 12px;
            color: #999;
            margin-bottom: 2px;
        }

        .detail-value {
            font-size: 15px;
            font-weight: 600;
            color: #333;
        }

        /* Action Buttons */
        .action-buttons {
            width: 100%;
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-top: auto;
        }

        .btn {
            width: 100%;
            height: 52px;
            border: none;
            border-radius: 26px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .btn-primary {
            background: #FF6B35;
            color: white;
        }

        .btn-primary:hover {
            background: #E55A2B;
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(255, 107, 53, 0.3);
        }

        .btn-secondary {
            background: transparent;
            color: #666;
        }

        .btn-secondary:hover {
            background: #F5F5F5;
        }

        /* Rating Section */
        .rating-section {
            width: 100%;
            background: #F8F8F8;
            border-radius: 16px;
            padding: 20px;
            margin-bottom: 20px;
        }

        .rating-title {
            font-size: 16px;
            font-weight: 600;
            color: #333;
            text-align: center;
            margin-bottom: 16px;
        }

        .stars-container {
            display: flex;
            justify-content: center;
            gap: 12px;
            margin-bottom: 12px;
        }

        .star {
            font-size: 40px;
            cursor: pointer;
            transition: all 0.2s ease;
            filter: grayscale(100%);
            opacity: 0.3;
        }

        .star.active {
            filter: grayscale(0%);
            opacity: 1;
            transform: scale(1.1);
        }

        .star:hover {
            transform: scale(1.2);
        }

        .rating-text {
            text-align: center;
            font-size: 14px;
            color: #666;
            min-height: 20px;
            margin-top: 8px;
            font-weight: 500;
        }

        /* Support Section */
        .support-section {
            width: 100%;
            text-align: center;
            margin-bottom: 16px;
        }

        .support-text {
            font-size: 13px;
            color: #999;
            margin-bottom: 8px;
        }

        .support-link {
            color: #FF6B35;
            text-decoration: none;
            font-weight: 600;
            font-size: 14px;
            cursor: pointer;
        }

        .support-link:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <div class="phone-frame">
        <div class="phone-screen">
            <!-- Status Bar -->
            <div class="status-bar">
                <div>9:41</div>
                <div class="status-icons">
                    <span>📶</span>
                    <span>📶</span>
                    <span>🔋</span>
                </div>
            </div>

            <!-- Content -->
            <div class="content">
                <!-- Success Icon -->
                <div class="success-icon">
                    <svg class="checkmark" viewBox="0 0 52 52">
                        <path d="M14 27l7 7 16-16"/>
                    </svg>
                </div>

                <!-- Title -->
                <h1 class="title">Giao dịch đã được duyệt!</h1>
                <p class="subtitle">Cảm ơn bạn đã góp phần bảo vệ môi trường</p>

                <!-- Summary Card -->
                <div class="summary-card">
                    <div class="total-section">
                        <div class="total-label">Tổng giá trị ước tính</div>
                        <div class="total-amount" id="totalAmount">125.000 đ</div>
                    </div>

                    <!-- Detail Items -->
                    <div class="detail-item">
                        <div class="detail-icon">📍</div>
                        <div class="detail-info">
                            <div class="detail-label">Điểm thu mua</div>
                            <div class="detail-value" id="locationName">Vựa ve chai Hà Đông</div>
                        </div>
                    </div>

                    <div class="detail-item">
                        <div class="detail-icon">♻️</div>
                        <div class="detail-info">
                            <div class="detail-label">Loại phế liệu</div>
                            <div class="detail-value" id="materialType">Giấy vụn, lon bìa</div>
                        </div>
                    </div>

                    <div class="detail-item">
                        <div class="detail-icon">🚛</div>
                        <div class="detail-info">
                            <div class="detail-label">Phương thức</div>
                            <div class="detail-value" id="methodType">Tiền mặt</div>
                        </div>
                    </div>
                </div>

                <!-- Rating Section -->
                <div class="rating-section">
                    <div class="rating-title">Đánh giá trải nghiệm của bạn</div>
                    <div class="stars-container">
                        <span class="star" data-rating="1" onclick="setRating(1)">⭐</span>
                        <span class="star" data-rating="2" onclick="setRating(2)">⭐</span>
                        <span class="star" data-rating="3" onclick="setRating(3)">⭐</span>
                        <span class="star" data-rating="4" onclick="setRating(4)">⭐</span>
                        <span class="star" data-rating="5" onclick="setRating(5)">⭐</span>
                    </div>
                    <div class="rating-text" id="ratingText"></div>
                </div>

                <!-- Support Section -->
                <div class="support-section">
                    <div class="support-text">Cần hỗ trợ?</div>
                    <a class="support-link" onclick="contactSupport()">Liên hệ tổng đài VeGo</a>
                </div>

                <!-- Action Buttons -->
                <div class="action-buttons">
                    <button class="btn btn-primary" onclick="viewHistory()">Xem lịch sử</button>
                    <button class="btn btn-secondary" onclick="goHome()">Về trang chủ</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        let currentRating = 0;
        
        // Rating texts for each star
        const ratingTexts = {
            1: "Rất tệ - Chúng tôi sẽ cải thiện!",
            2: "Tệ - Cần cải thiện nhiều hơn",
            3: "Bình thường - Chúng tôi có thể làm tốt hơn",
            4: "Tốt - Cảm ơn bạn đã tin tưởng!",
            5: "Tuyệt vời - Cảm ơn bạn rất nhiều!"
        };
        
        // Set rating
        function setRating(rating) {
            currentRating = rating;
            
            // Update stars
            const stars = document.querySelectorAll('.star');
            stars.forEach((star, index) => {
                if (index < rating) {
                    star.classList.add('active');
                } else {
                    star.classList.remove('active');
                }
            });
            
            // Update text
            document.getElementById('ratingText').textContent = ratingTexts[rating];
            
            // Save rating to sessionStorage
            const estimateData = JSON.parse(sessionStorage.getItem('estimateData') || '{}');
            estimateData.rating = rating;
            sessionStorage.setItem('estimateData', JSON.stringify(estimateData));
        }
        
        // Contact support - Open chat with support team
        function contactSupport() {
            // Save support chat info
            localStorage.setItem('chatShop', JSON.stringify({
                name: 'Tổng đài VeGo',
                phone: '1900 xxxx',
                isSupport: true
            }));
            
            // Navigate to chat
            document.body.style.transition = 'opacity 0.3s ease';
            document.body.style.opacity = '0';
            
            setTimeout(() => {
                window.location.href = 'messages.html';
            }, 300);
        }
        
        // Load data from sessionStorage
        window.onload = function() {
            const estimateData = JSON.parse(sessionStorage.getItem('estimateData') || '{}');
            const selectedMethod = sessionStorage.getItem('selectedMethod');
            
            // Update total amount
            if (estimateData.total) {
                document.getElementById('totalAmount').textContent = 
                    estimateData.total.toLocaleString('vi-VN') + ' đ';
            }
            
            // Update location name
            if (estimateData.location && estimateData.location.title) {
                document.getElementById('locationName').textContent = estimateData.location.title;
            }
            
            // Update material type - show all selected materials
            if (estimateData.materials && estimateData.materials.length > 0) {
                const materialNames = estimateData.materials.map(m => m.name).join(', ');
                document.getElementById('materialType').textContent = materialNames;
            }
            
            // Update method type
            if (selectedMethod) {
                const methodText = selectedMethod === 'station' ? 'Mang đến trạm' : 'Thu gom tận nơi';
                document.getElementById('methodType').textContent = methodText;
            }

            // Save new order to sessionStorage for activity page
            const newOrder = {
                id: 'order-' + Date.now(),
                locationName: estimateData.location?.title || 'Vựa ve chai',
                locationAddress: estimateData.location?.address || 'Tại nhà',
                materials: estimateData.materials || [],
                total: estimateData.total || 0,
                method: selectedMethod === 'station' ? 'Mang đến trạm' : 'Thu gom tận nơi',
                status: 'approved',
                statusText: 'Đang duyệt',
                statusClass: 'status-approved',
                statusIcon: '⚡',
                timestamp: Date.now(),
                orderCode: '#VG-' + Math.floor(Math.random() * 10000000)
            };
            
            // Get existing orders or create new array
            let allOrders = JSON.parse(sessionStorage.getItem('allOrders') || '[]');
            
            // Add new order to the beginning
            allOrders.unshift(newOrder);
            
            // Save back to sessionStorage
            sessionStorage.setItem('allOrders', JSON.stringify(allOrders));
        };

        function viewHistory() {
            // Add fade out animation
            document.body.style.transition = 'opacity 0.3s ease';
            document.body.style.opacity = '0';
            
            setTimeout(() => {
                window.location.href = '../Activity/activity.html';
            }, 300);
        }

        function goHome() {
            // Add fade out animation
            document.body.style.transition = 'opacity 0.3s ease';
            document.body.style.opacity = '0';
            
            setTimeout(() => {
                window.location.href = 'home-map.html';
            }, 300);
        }
    </script>
</body>
</html>
