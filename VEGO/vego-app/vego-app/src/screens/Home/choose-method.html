<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VeGo - Chọn Phương Thức</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex; align-items: center; justify-content: center;
            padding: 20px;
        }
        .phone-frame {
            width: 375px; height: 812px; background: #000;
            border-radius: 40px; padding: 8px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.4);
            position: relative; transform: scale(0.8);
            transform-origin: center center; flex-shrink: 0; margin: -81px 0;
        }
        .phone-screen {
            width: 100%; height: 100%; background: #FFFFFF;
            border-radius: 32px; overflow-y: auto; position: relative;
            scrollbar-width: none; -ms-overflow-style: none;
        }
        .phone-screen::-webkit-scrollbar { display: none; }
        .header {
            position: sticky; top: 0; background: white;
            padding: 50px 20px 15px;
            display: flex; align-items: center; gap: 16px;
            z-index: 10; border-bottom: 1px solid #F0F0F0;
        }
        .back-btn {
            width: 36px; height: 36px; background: transparent;
            border: none; display: flex; align-items: center;
            justify-content: center; cursor: pointer;
        }
        .header-title { font-size: 18px; font-weight: 600; color: #333; }
        .content { padding: 24px 20px 40px; }
        .main-title { font-size: 24px; font-weight: 700; color: #333; margin-bottom: 8px; }
        .subtitle { font-size: 14px; color: #999; margin-bottom: 24px; }

        .method-option {
            background: white; border: 2px solid #E0E0E0;
            border-radius: 16px; padding: 20px; margin-bottom: 16px;
            display: flex; align-items: center; gap: 16px;
            cursor: pointer; transition: all 0.2s ease;
        }
        .method-option:hover {
            border-color: #75FF93; transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(117,255,147,0.2);
        }
        .method-option.selected { border-color: #75FF93; background: #F0FFF4; }
        .method-icon {
            width: 56px; height: 56px; background: #F5F5F5;
            border-radius: 12px; display: flex; align-items: center;
            justify-content: center; font-size: 32px; flex-shrink: 0;
        }
        .method-option.selected .method-icon { background: #E8F8ED; }
        .method-info { flex: 1; }
        .method-name { font-size: 18px; font-weight: 600; color: #333; margin-bottom: 4px; }
        .method-desc { font-size: 14px; color: #999; }

        .info-box {
            background: #EEF2FF; border-radius: 12px; padding: 16px;
            display: flex; gap: 12px; margin-top: 24px;
        }
        .info-icon {
            width: 24px; height: 24px; background: #6366F1;
            border-radius: 50%; display: flex; align-items: center;
            justify-content: center; color: white; font-weight: 700;
            font-size: 14px; flex-shrink: 0;
        }
        .info-text { font-size: 13px; color: #4F46E5; line-height: 1.5; }

        .continue-btn {
            width: 100%; height: 52px; background: #FF6B35;
            border: none; border-radius: 26px; color: white;
            font-size: 16px; font-weight: 600; cursor: pointer;
            transition: all 0.2s ease; margin-top: 20px;
        }
        .continue-btn:hover {
            background: #E55A2B; transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(255,107,53,0.3);
        }

        .material-summary {
            background: linear-gradient(135deg, #E8F8ED 0%, #D4F4DD 100%);
            border: 2px solid #75FF93; border-radius: 16px;
            padding: 16px; margin-bottom: 24px;
        }
        .summary-header {
            display: flex; align-items: center; gap: 12px; margin-bottom: 8px;
        }
        .summary-icon {
            width: 48px; height: 48px; background: white;
            border-radius: 12px; display: flex; align-items: center;
            justify-content: center; font-size: 24px; flex-shrink: 0;
        }
        .summary-info { flex: 1; }
        .summary-label { font-size: 12px; color: #4CAF50; font-weight: 600; margin-bottom: 4px; }
        .summary-value { font-size: 16px; font-weight: 700; color: #333; }
        .summary-price { font-size: 20px; font-weight: 700; color: #FF6B35; }
        .material-row {
            display: flex; justify-content: space-between; align-items: center;
            padding: 6px 0; border-top: 1px solid rgba(117,255,147,0.3);
            font-size: 14px; color: #333;
        }
        .material-row-name { font-weight: 500; }
        .material-row-price { font-weight: 600; color: #FF6B35; }
        .summary-total-row {
            display: flex; justify-content: space-between; align-items: center;
            padding-top: 8px; margin-top: 4px;
            border-top: 2px solid #75FF93;
            font-size: 15px; font-weight: 700; color: #333;
        }
    </style>
</head>
<body>
    <div class="phone-frame">
        <div class="phone-screen">
            <div class="header">
                <button class="back-btn" onclick="goBack()">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none">
                        <path d="M15 18l-6-6 6-6" stroke="#333" stroke-width="2" stroke-linecap="round"/>
                    </svg>
                </button>
                <div class="header-title">Chọn Phương Thức</div>
            </div>

            <div class="content">
                <h1 class="main-title">Bạn muốn tái chế thế nào?</h1>
                <p class="subtitle">Chọn phương thức phù hợp</p>

                <div class="material-summary" id="materialSummary" style="display:none;">
                    <div class="summary-header">
                        <span class="summary-icon" id="summaryIcon">♻️</span>
                        <div class="summary-info">
                            <div class="summary-label" id="summaryLabel">Phế liệu đã quét</div>
                            <div class="summary-value" id="summaryMaterial">Giấy vụn - 5kg</div>
                        </div>
                        <div class="summary-price" id="summaryPrice">25.000đ</div>
                    </div>
                    <div id="materialRows"></div>
                </div>

                <div class="method-option" id="method1" onclick="selectMethod('station')">
                    <div class="method-icon">🚚</div>
                    <div class="method-info">
                        <div class="method-name">Mang đến trạm</div>
                        <div class="method-desc">Nhận giá đúng với hệ thống</div>
                    </div>
                </div>

                <div class="method-option selected" id="method2" onclick="selectMethod('pickup')">
                    <div class="method-icon">🚛</div>
                    <div class="method-info">
                        <div class="method-name">Thu gom tận nơi</div>
                        <div class="method-desc">Nhân viên sẽ đến cửa và thu mua</div>
                    </div>
                </div>

                <div class="info-box">
                    <div class="info-icon">i</div>
                    <div class="info-text">
                        Với "Thu gom tận nơi", đơn hàng tối thiểu là 10kg để được miễn phí vận chuyển
                    </div>
                </div>

                <button class="continue-btn" onclick="continueToNext()">Tiếp tục</button>
            </div>
        </div>
    </div>

    <script>
        let selectedMethod = 'pickup';

        window.onload = function() {
            const estimateData = JSON.parse(sessionStorage.getItem('estimateData') || '{}');
            if (!estimateData.materials || estimateData.materials.length === 0) return;

            document.getElementById('materialSummary').style.display = 'block';
            const source = estimateData.source;

            if (source === 'camera') {
                const m = estimateData.materials[0];
                document.getElementById('summaryLabel').textContent = 'Phế liệu đã quét';
                document.getElementById('summaryIcon').textContent = '📷';
                document.getElementById('summaryMaterial').textContent = `${m.name} - ${m.weight}kg`;
                document.getElementById('summaryPrice').textContent = m.total.toLocaleString('vi-VN') + 'đ';
                document.getElementById('materialRows').innerHTML = '';
            } else {
                const total = estimateData.total;
                const count = estimateData.materials.length;
                document.getElementById('summaryLabel').textContent = 'Phế liệu đã chọn';
                document.getElementById('summaryIcon').textContent = '📍';
                document.getElementById('summaryMaterial').textContent = `${count} loại phế liệu`;
                document.getElementById('summaryPrice').style.display = 'none';

                let rowsHtml = '';
                estimateData.materials.forEach(m => {
                    rowsHtml += `
                        <div class="material-row">
                            <span class="material-row-name">${m.name} — ${m.weight}kg</span>
                            <span class="material-row-price">${m.total.toLocaleString('vi-VN')}đ</span>
                        </div>`;
                });
                rowsHtml += `
                    <div class="summary-total-row">
                        <span>Tổng cộng</span>
                        <span>${total.toLocaleString('vi-VN')}đ</span>
                    </div>`;
                document.getElementById('materialRows').innerHTML = rowsHtml;
            }
        };

        function selectMethod(method) {
            selectedMethod = method;
            document.querySelectorAll('.method-option').forEach(o => o.classList.remove('selected'));
            if (method === 'station') {
                document.getElementById('method1').classList.add('selected');
            } else {
                document.getElementById('method2').classList.add('selected');
            }
        }

        function goBack() {
            document.body.style.transition = 'opacity 0.3s ease';
            document.body.style.opacity = '0';
            setTimeout(() => { window.history.back(); }, 300);
        }

        function continueToNext() {
            sessionStorage.setItem('selectedMethod', selectedMethod);
            document.body.style.transition = 'opacity 0.3s ease';
            document.body.style.opacity = '0';
            setTimeout(() => { window.location.href = 'transaction-success.html'; }, 300);
        }
    </script>
</body>
</html>
